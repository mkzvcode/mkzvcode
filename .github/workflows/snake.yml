name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: mkzvcode
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23f3f0fa&color_dots=%23160f22,%232d1b4e,%236d28d9,%239333ea,%23c084fc

      - uses: actions/upload-artifact@v4
        with:
          name: github-contribution-grid-snake
          path: dist/

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
